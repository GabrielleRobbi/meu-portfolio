apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitea.rubensminoru.com/gabrielle.robbi/portfolio.git
    targetRevision: main
    path: iac/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: bygabriellerobbi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true