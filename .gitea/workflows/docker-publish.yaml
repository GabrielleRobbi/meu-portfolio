name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.GITEA_TOKEN }}" | docker login gitea.rubensminoru.com \
            -u "rubens.bueno" \
            --password-stdin

      - name: Build da imagem
        run: |
          docker build \
            -t gitea.rubensminoru.com/rubens.bueno/portfolio:latest \
            -t gitea.rubensminoru.com/rubens.bueno/portfolio:${{ gitea.sha }} \
            .

      - name: Push da imagem
        run: |
          docker push gitea.rubensminoru.com/rubens.bueno/portfolio:latest
          docker push gitea.rubensminoru.com/rubens.bueno/portfolio:${{ gitea.sha }}
