name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: gitea.rubensminoru.com/rubens.bueno/portfolio

jobs:
  docker:
    runs-on: docker-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.PUBLISHING_TOKEN }}" | docker login gitea.rubensminoru.com \
            -u "rubens.bueno" \
            --password-stdin

      - name: Build da imagem
        run: |
          docker build \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            -t ${{ env.DOCKER_IMAGE }}:${{ gitea.sha }} \
            .

      - name: Push da imagem
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ gitea.sha }}

  update_image:
    runs-on: ubuntu-latest
    # needs: [docker]

    steps:
      - name: Instalar git
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
              git \
            && apt-get clean \
          && rm -rf /var/lib/apt/lists/*

      - name: Checkout
        run: |
          git clone "https://rubens.bueno:${{ secrets.PUBLISHING_TOKEN }}@gitea.rubensminoru.com/gabrielle.robbi/portfolio.git" .
          git checkout main

      - name: Atualizar manifest com nova tag
        run: |
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${{ gitea.sha }}|" iac/k8s/deployment.yaml

          git config user.name "gitea-actions"
          git config user.email "gitea-actions@gitea.local"

          git add iac/k8s/deployment.yaml
          git commit -m "deploy: portfolio ${{ gitea.sha }}" || echo "Nada para commitar"
          git push
