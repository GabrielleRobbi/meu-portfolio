name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: agitea.rubensminoru.com/rubens.bueno/portfoliod

jobs:
  docker:
    runs-on: docker-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.PUBLISHING_TOKEN }}" | docker login gitea.rubensminoru.com \
            -u "rubens.bueno" \
            --password-stdin

      - name: Build da imagem
        run: |
          docker build \
            -t {{ env.DOCKER_IMAGE }}:latest \
            -t {{ env.DOCKER_IMAGE }}:${{ gitea.sha }} \
            .

      - name: Push da imagem
        run: |
          docker push {{ env.DOCKER_IMAGE }}:latest
          docker push {{ env.DOCKER_IMAGE }}:${{ gitea.sha }}

      - name: Atualizar manifest com nova tag
        run: |
          sed -i "s|image: {{ env.DOCKER_IMAGE }}:.*|image: {{ env.DOCKER_IMAGE }}:${{ gitea.sha }}|" iac/k8s/deployment.yaml

          git config user.name "gitea-actions"
          git config user.email "gitea-actions@gitea.local"

          git add iac/k8s/deployment.yaml
          git commit -m "deploy: portfolio ${{ gitea.sha }}" || echo "Nada para commitar"
          git push
