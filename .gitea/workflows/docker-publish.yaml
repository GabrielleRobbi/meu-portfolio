name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Gitea Registry
        uses: docker/login-action@v4
        with:
          registry: gitea.rubensminoru.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.PUBLISHING_TOKEN }}

      - name: Build da imagem
        run: |
          docker build \
            -t gitea.rubensminoru.com/rubens.bueno/portfolio:latest \
            -t gitea.rubensminoru.com/rubens.bueno/portfolio:${{ gitea.sha }} \
            .

      - name: Push da imagem
        run: |
          docker push gitea.rubensminoru.com/rubens.bueno/portfolio:latest
          docker push gitea.rubensminoru.com/rubens.bueno/portfolio:${{ gitea.sha }}
